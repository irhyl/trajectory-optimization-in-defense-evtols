# Planning Layer Configuration

crs:
  working: "EPSG:4326"
  input: "EPSG:4326"

resolution:
  base_meter: 2.0
  grid_deg: 0.01

routing:
  algorithm: "astar"
  heuristic: "euclidean"
  grid_resolution_deg: 0.01
  max_iterations: 1000
  goal_tolerance_km: 0.5
  objective_weights:
    distance: 0.3
    energy: 0.3
    risk: 0.3
    time: 0.1

algorithms:
  astar:
    heuristic: "euclidean"
    max_nodes: 10000
    search_radius_km: 50
  dijkstra:
    max_nodes: 5000
  theta_star:
    line_of_sight_check: true
    max_iterations: 1000
  rrt_star:
    max_iterations: 5000
    search_radius: 100.0  # meters
    goal_bias: 0.1
    rewire_radius: 150.0  # meters

energy:
  battery_capacity_kwh: 100.0
  reserve_fraction: 0.2
  charging_efficiency: 0.9
  discharge_efficiency: 0.95
  specific_energy_wh_kg: 250.0

risk:
  max_acceptable_risk: 0.7
  threat_weight: 0.4
  obstacle_weight: 0.3
  terrain_weight: 0.2
  wind_weight: 0.1

optimization:
  method: "nsga3"
  population_size: 50
  num_generations: 100
  mutation_probability: 0.2
  crossover_probability: 0.8
  convergence_tolerance: 1e-6

constraints:
  max_altitude_m: 1000.0
  min_altitude_m: 10.0
  max_speed_ms: 50.0
  max_acceleration_ms2: 5.0
  max_distance_km: 500.0
  max_flight_time_s: 3600.0

smoothing:
  method: "cubic_spline"
  waypoint_spacing: 10.0  # meters
  curvature_limit: 0.1  # 1/meters

mission:
  max_waypoints: 100
  min_waypoint_separation_m: 50.0
  contingency_routes: 3

serving:
  perception_client_url: "http://localhost:8001"
  use_fake_perception: false
  output_csv_dir: "outputs/planning"
