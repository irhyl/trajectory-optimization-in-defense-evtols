# Vehicle Layer Configuration

# Mass and inertia properties
mass:
  total_kg: 1500.0
  empty_kg: 900.0
  payload_max_kg: 600.0
  cg_x: 0.5
  cg_y: 0.0
  cg_z: -0.2

inertia:
  Ixx: 8781.25  # kg*m²
  Iyy: 12500.0  # kg*m²
  Izz: 5281.25  # kg*m²
  Ixy: 0.0  # kg*m²
  Ixz: 0.0  # kg*m²
  Iyz: 0.0  # kg*m²

aerodynamics:
  reference_area_m2: 50.0
  mean_chord_m: 3.0
  cd0: 0.025
  cd_alpha: 0.05
  cl_alpha: 5.73

rotor:
  num_rotors: 4
  rotor_radius_m: 1.5
  blade_pitch_range: [-30, 30]  # degrees
  max_rpm: 2000
  solidity: 0.05

battery:
  capacity_kwh: 100.0
  nominal_voltage_v: 400.0
  max_discharge_rate_c: 3.0
  max_charge_rate_c: 1.0
  internal_resistance_ohm: 0.05
  nominal_temperature_c: 25.0
  temp_coeff_capacity: -0.005
  aging_factor: 0.99

motors:
  kv_rpm_per_volt: 100.0
  internal_resistance_ohm: 0.1
  max_rpm: 10000
  max_torque_nm: 100.0
  efficiency_curve:
    operating_point: 0.8
    peak_efficiency: 0.85

esc:
  max_current_a: 300.0
  response_time_ms: 10.0
  efficiency: 0.95

flight_envelope:
  max_altitude_m: 1000.0
  min_altitude_m: 10.0
  max_speed_ms: 50.0
  min_speed_ms: 5.0
  max_climb_rate_ms: 10.0
  max_descent_rate_ms: 8.0
  max_load_factor_g: 3.0
  max_bank_angle_deg: 45.0
  max_pitch_angle_deg: 30.0

dynamics:
  integration_method: "rk4"
  time_step_s: 0.01
  max_simulation_time_s: 3600.0

constraints:
  max_payload_kg: 100.0
  max_endurance_s: 3600.0
  min_battery_soc: 0.2

faults:
  enable_fault_injection: false
  rotor_failure_probability: 0.0
  motor_failure_probability: 0.0
  battery_degradation_rate: 0.0

api:
  host: "localhost"
  port: 8001
  timeout_s: 30
